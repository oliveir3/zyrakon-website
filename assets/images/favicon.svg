<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="phoenixGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B2B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF8C42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB347;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Simplified Phoenix shape -->
  <g transform="translate(32,32)">
    <!-- Body -->
    <path d="M0,-24 C-8,-18 -12,-8 -10,2 C-8,12 -4,18 0,22 C4,18 8,12 10,2 C12,-8 8,-18 0,-24Z" 
          fill="url(#phoenixGrad)" />
    <!-- Left Wing -->
    <path d="M-6,-10 C-16,-16 -24,-14 -28,-8 C-24,-6 -18,-4 -10,-6Z" 
          fill="url(#phoenixGrad)" opacity="0.8"/>
    <!-- Right Wing -->
    <path d="M6,-10 C16,-16 24,-14 28,-8 C24,-6 18,-4 10,-6Z" 
          fill="url(#phoenixGrad)" opacity="0.8"/>
    <!-- Head -->
    <circle cx="0" cy="-22" r="5" fill="#FF6B2B"/>
    <!-- Eye -->
    <circle cx="2" cy="-23" r="1.5" fill="#0A1628"/>
  </g>
</svg>
