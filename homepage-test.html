<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyrakon - Homepage Test</title>
    <link rel="stylesheet" href="assets/css/design-system.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body style="background:#F5F3EE;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
    <div style="max-width:1000px;width:100%;display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center;">
        <div>
            <p style="font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#173B63;margin-bottom:1rem;">Building the Foundations of Tomorrow</p>
            <h1 style="font-family:'Source Serif 4',Georgia,serif;font-size:2.8rem;font-weight:600;line-height:1.2;color:#1A1A1A;margin-bottom:1.5rem;">Technology that <span style="color:#173B63;">earns trust</span> before it asks for it.</h1>
            <p style="color:#6D7278;line-height:1.65;margin-bottom:2rem;">Zyrakon builds enterprise platforms for digital signatures, banking infrastructure, airport operations, and AI-powered intelligence.</p>
            <div style="display:flex;gap:1rem;flex-wrap:wrap;">
                <a href="#" style="background:#173B63;color:#F5F3EE;padding:0.75rem 1.5rem;border-radius:6px;text-decoration:none;font-weight:600;">Explore Products</a>
                <a href="#" style="border:1.5px solid #ccc;color:#1A1A1A;padding:0.75rem 1.5rem;border-radius:6px;text-decoration:none;font-weight:600;">About Zyrakon</a>
            </div>
        </div>
        <div>
            <img src="assets/images/hero/enterprise-foundation.png" alt="Enterprise foundation" style="width:100%;border-radius:8px;box-shadow:0 4px 24px rgba(0,0,0,0.1);" onerror="this.style.outline='3px solid red';this.style.outlineOffset='-3px';">
        </div>
    </div>
</body>
</html>
